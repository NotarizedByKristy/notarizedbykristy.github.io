<style>
/* ============================================================
   NAV — Self-contained styles. Works on any page regardless
   of whether parent CSS defines the variables.
   ============================================================ */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:#0d1f3c;background:var(--navy-dark,#0d1f3c);border-bottom:1px solid rgba(184,134,11,.2);padding:0 6%;display:flex;align-items:center;justify-content:space-between;height:72px;font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased}
nav *{box-sizing:border-box}
nav .nav-logo{display:flex;align-items:center;gap:14px;text-decoration:none}
nav .nav-logo-mark{width:36px;height:36px;border:1.5px solid #B8860B;border:1.5px solid var(--gold,#B8860B);display:flex;align-items:center;justify-content:center;flex-shrink:0}
nav .nav-logo-mark span{font-family:'EB Garamond',serif;font-size:17px;font-weight:600;color:#B8860B;color:var(--gold,#B8860B);line-height:1}
nav .nav-logo-text{font-family:'EB Garamond',serif;font-size:16px;font-weight:600;color:#fff;color:var(--white,#fff);letter-spacing:.3px;line-height:1.2}
nav .nav-logo-sub{font-family:'Outfit',sans-serif;font-size:9px;font-weight:400;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;display:block;margin-top:1px}
nav .nav-links{display:flex;align-items:center;gap:30px;list-style:none;margin:0;padding:0}
nav .nav-links a{color:rgba(255,255,255,.55);text-decoration:none;font-size:12px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;transition:color .2s}
nav .nav-links a:hover,nav .nav-links a.active{color:#fff;color:var(--white,#fff)}
nav .nav-cta{color:#B8860B!important;color:var(--gold,#B8860B)!important;border:1px solid rgba(184,134,11,.5)!important;padding:8px 22px!important;font-weight:500!important;transition:all .2s!important}
nav .nav-cta:hover{background:#B8860B!important;background:var(--gold,#B8860B)!important;color:#0d1f3c!important;color:var(--navy-dark,#0d1f3c)!important;border-color:#B8860B!important;border-color:var(--gold,#B8860B)!important}
nav .hamburger{display:none;cursor:pointer;background:none;border:none;padding:4px}
nav .hamburger span{display:block;width:22px;height:1.5px;background:rgba(255,255,255,.6);margin:5px 0}
.mobile-menu{display:none;position:fixed;top:72px;left:0;right:0;background:#0d1f3c;background:var(--navy-dark,#0d1f3c);padding:24px 6% 32px;z-index:999;border-bottom:1px solid rgba(184,134,11,.15);font-family:'Outfit',sans-serif}
.mobile-menu.open{display:block}
.mobile-menu a{display:block;color:rgba(255,255,255,.65);text-decoration:none;font-size:14px;font-weight:400;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.05);letter-spacing:.3px}
@media(max-width:768px){nav .nav-links{display:none}nav .hamburger{display:block}}
</style>

<div class="mobile-menu" id="mobileMenu">
  <a href="/services.html">Services</a>
  <a href="/apostille.html">Apostille</a>

</div>

<script>
function toggleMenu(){
  const menu = document.getElementById('mobileMenu');
  const btn = document.querySelector('.hamburger');
  const isOpen = menu.classList.toggle('open');
  if(btn) btn.setAttribute('aria-expanded', isOpen);
}
document.querySelectorAll('.mobile-menu a').forEach(a=>{
  a.addEventListener('click',()=>{
    document.getElementById('mobileMenu').classList.remove('open');
    const btn = document.querySelector('.hamburger');
    if(btn) btn.setAttribute('aria-expanded', 'false');
  });
});
// Highlight active nav link based on current page
(function(){
  const path = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-links a:not(.nav-cta)').forEach(a=>{
    if(a.getAttribute('href') === '/' + path) a.classList.add('active');
  });
})();
</script>
